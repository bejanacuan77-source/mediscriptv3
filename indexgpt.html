<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediScript AI v3 (Stable)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
body{background:#05050f;color:#e2e2ff;font-family:sans-serif;padding:20px;}
button{padding:12px 20px;border:none;border-radius:8px;background:#00e5a0;color:#000;font-weight:bold;cursor:pointer;}
textarea,input{width:100%;padding:10px;margin-top:10px;background:#111;border:1px solid #333;color:#fff;border-radius:8px;}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState} = React;

// =========================
// 🔑 SIMPAN API KEY
// =========================
const KEY_STORAGE = "mediscript_key";

function loadKey(){
  return localStorage.getItem(KEY_STORAGE) || "";
}

function saveKey(k){
  localStorage.setItem(KEY_STORAGE,k);
}


// =========================
// 🚀 GEMINI (VERSI STABIL)
// =========================
async function callGemini(apiKey, prompt){

  if(!apiKey){
    throw new Error("API Key belum diisi!");
  }

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
    {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        contents:[
          {
            role:"user",
            parts:[{text:prompt}]
          }
        ],
        generationConfig:{
          maxOutputTokens:1000,
          temperature:0.7
        }
      })
    }
  );

  if(!res.ok){
    const err = await res.text();
    throw new Error("Error: " + err);
  }

  const data = await res.json();

  return data?.candidates?.[0]?.content?.parts?.[0]?.text || "Tidak ada respon";
}


// =========================
// 🎯 APP
// =========================
function App(){

  const [apiKey,setApiKey] = useState(loadKey());
  const [prompt,setPrompt] = useState("");
  const [result,setResult] = useState("");
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");

  const generate = async () => {

    if(loading) return; // anti spam

    if(!prompt){
      setError("Isi prompt dulu!");
      return;
    }

    setLoading(true);
    setError("");
    setResult("");

    try{
      const res = await callGemini(apiKey,prompt);
      setResult(res);
    }catch(e){
      setError(e.message);
    }

    setLoading(false);
  };


  return (
    <div style={{maxWidth:600,margin:"auto"}}>

      <h2>MediScript AI (Stable)</h2>

      <label>API Key:</label>
      <input
        value={apiKey}
        onChange={(e)=>{
          setApiKey(e.target.value);
          saveKey(e.target.value);
        }}
        placeholder="AIza..."
      />

      <label>Prompt:</label>
      <textarea
        rows={5}
        value={prompt}
        onChange={(e)=>setPrompt(e.target.value)}
        placeholder="Contoh: Buat script video tentang diabetes..."
      />

      <button onClick={generate}>
        {loading ? "Generating..." : "Generate"}
      </button>

      {error && (
        <div style={{color:"red",marginTop:10}}>
          {error}
        </div>
      )}

      {result && (
        <div style={{marginTop:20,whiteSpace:"pre-wrap"}}>
          {result}
        </div>
      )}

    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));

</script>
</body>
</html>
